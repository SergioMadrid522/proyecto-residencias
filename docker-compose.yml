services:
  db:
    image: postgres:17
    container_name: postgres_local
    environment:
      POSTGRES_DB: bugtracker_local
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    image: node:22-alpine
    container_name: nextjs_service
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/bugtracker_local
    command: sh -c "npm install && npx prisma migrate deploy && npm run dev"
    depends_on:
      - db

volumes:
  pgdata:
